<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FADAISI — Page 3</title>

  <style>
    :root {
      --bg: #efefef;
      --text: #1a1a1a;
      --accent: #ef2b2b;
      --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 18px 35px rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page-shell {
      position: relative;
      width: 100%;
      min-height: 100vh;
    }

    .page {
      width: min(100%, 390px);
      margin: 0 auto;
      padding: 4px 4px 56px;
      position: relative;
    }

    .meta-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--accent);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 8px;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 18px;
      white-space: nowrap;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin-bottom: -10px;
    }

    .hero-logo {
      width: min(92vw, 220px);
      object-fit: contain;
      margin-bottom: -8px;
    }

    .hero-title {
      margin: 0;
      text-align: center;
      color: var(--accent);
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      font-size: 16px;
      line-height: 1;
      text-transform: uppercase;
    }

    .top-links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 16px;
      margin: 10px 0 20px;
      padding: 0 16px;
    }

    .pill-wrap {
      display: flex;
    }

    .pill-wrap.right {
      justify-content: flex-end;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-decoration: underline;
      line-height: 1;
      transition: opacity 0.18s ease;
    }

    .pill:hover {
      opacity: 0.92;
    }

    .sparkle-cursor {
      position: fixed;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: normal;
    }

    .cursor-core {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,102,196,0.9) 45%, rgba(255,102,196,0.08) 100%);
      box-shadow:
        0 0 10px rgba(255,102,196,0.8),
        0 0 18px rgba(255,102,196,0.55),
        0 0 26px rgba(255,102,196,0.35);
      transform: translate(-50%, -50%);
    }

    .spark {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,102,196,0.8);
      transform: translate(-50%, -50%);
      animation: sparkleFade 800ms ease-out forwards;
      box-shadow: 0 0 8px rgba(255,102,196,0.75);
    }

    @keyframes sparkleFade {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.2);
      }
    }

    .page3-main {
      width: min(100%, 1180px);
      margin: 0 auto;
      padding: 4px 20px 80px;
    }

    /* ===== ORBIT SECTION ===== */

    .orbit-section {
      position: relative;
      width: 100%;
      display: grid;
      place-items: center;
      margin-top: 0;
      margin-bottom: 76px;
    }

    .orbit-stage {
      position: relative;
      width: min(82vw, 700px);
      aspect-ratio: 1 / 1;
      max-width: 700px;
      min-width: 280px;
      overflow: visible;
    }

    .orbit-ring {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: 50%;
    }

    .orbit-item {
      position: absolute;
      top: 50%;
      left: 50%;
      width: clamp(92px, 13vw, 138px);
      aspect-ratio: 1.48 / 1;
      transform-origin: center center;
      border: 3px solid rgba(255, 255, 255, 0.55);
      background: rgba(255, 255, 255, 0.15);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      cursor: pointer;
      transition:
        transform 0.22s ease,
        box-shadow 0.22s ease,
        border-color 0.22s ease,
        filter 0.22s ease,
        opacity 0.22s ease;
      will-change: transform;
    }

    .orbit-item img,
    .orbit-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.96) contrast(1.02);
      pointer-events: none;
    }

    .orbit-item:hover {
      z-index: 20 !important;
      border-color: rgba(255, 59, 48, 0.4);
      box-shadow: var(--shadow-hover);
      filter: brightness(1.05);
    }

    .orbit-item::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.04) 0%,
          rgba(255, 255, 255, 0) 40%,
          rgba(255, 255, 255, 0.06) 100%
        );
      mix-blend-mode: screen;
      pointer-events: none;
    }

    /* ===== LOWER GRID ===== */

    .archive-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 28px 22px;
      align-items: start;
      justify-items: center;
    }

    .archive-card {
      position: relative;
      width: 100%;
      max-width: 150px;
      aspect-ratio: 0.74 / 1;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      transition:
        transform 0.22s ease,
        box-shadow 0.22s ease,
        filter 0.22s ease;
      cursor: pointer;
      isolation: isolate;
    }

    .archive-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.26s ease, filter 0.26s ease;
    }

    .archive-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.14), transparent 58%),
        linear-gradient(180deg, rgba(255, 59, 48, 0.07), rgba(255, 255, 255, 0));
      opacity: 0;
      transition: opacity 0.24s ease;
      z-index: 1;
      pointer-events: none;
    }

    .archive-card::after {
      content: "";
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
      pointer-events: none;
      z-index: 2;
    }

    .archive-card:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.11);
      filter: brightness(1.03);
    }

    .archive-card:hover::before {
      opacity: 1;
    }

    .archive-card:hover img {
      transform: scale(1.045);
      filter: saturate(1.05) contrast(1.04);
    }

    /* ===== OPTIONAL SECTION SPACING TO MATCH OTHER PAGES ===== */

    .bottom-space {
      height: 60px;
    }

    .site-footer {
      width: min(100%, 390px);
      margin: 32px auto 0;
      padding: 0 8px 20px;
      color: var(--accent);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      line-height: 1.35;
      text-align: center;
    }

    /* ===== TABLET ===== */

    @media (max-width: 900px) {
      .page3-main {
        padding-top: 0;
      }

      .archive-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 22px 16px;
      }

      .archive-card {
        max-width: 132px;
      }
    }

    /* ===== MOBILE ===== */

    @media (max-width: 768px) {
      .page3-main {
        padding: 0 18px 70px;
      }

      .orbit-section {
        margin-bottom: 56px;
      }

      .orbit-stage {
        width: min(90vw, 420px);
      }

      .orbit-item {
        width: clamp(84px, 24vw, 108px);
        border-width: 2px;
      }

      .archive-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px 12px;
      }

      .archive-card {
        max-width: 94px;
      }
    }

    @media (max-width: 640px) {
      .archive-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px 14px;
      }

      .archive-card {
        max-width: 140px;
      }
    }

    @media (max-width: 520px) {
      .meta-bar {
        font-size: 7px;
      }

      .page3-main {
        padding-left: 16px;
        padding-right: 16px;
      }

      .archive-grid {
        gap: 16px 10px;
      }

      .archive-card {
        max-width: 84px;
      }

      .site-footer {
        font-size: 11px;
        padding-bottom: 18px;
      }
    }

    @media (min-width: 900px) {
      .page {
        width: min(100%, 1000px);
        padding: 8px 8px 100px;
      }

      .meta-bar {
        font-size: 12px;
        margin-bottom: 26px;
      }

      .hero {
        gap: 14px;
        margin-bottom: 24px;
      }

      .hero-logo {
        width: 320px;
        margin-bottom: 0;
      }

      .hero-title {
        font-size: 28px;
      }

      .top-links {
        margin: 20px 0 42px;
        padding: 0 18px;
      }

      .site-footer {
        width: min(100%, 1000px);
        font-size: 13px;
        padding-bottom: 28px;
      }
    }
  </style>
</head>
<body>

  <script>
    const orbitStage = document.getElementById("orbitStage");
    const orbitItems = Array.from(document.querySelectorAll(".orbit-item"));
    const cursor = document.querySelector(".sparkle-cursor");
    const core = document.querySelector(".cursor-core");

    let baseAngle = -Math.PI / 2;
    let targetAngle = baseAngle;
    let currentAngle = baseAngle;
    let pointerX = window.innerWidth / 2;
    let pointerY = window.innerHeight / 2;
    let cursorX = pointerX;
    let cursorY = pointerY;
    let autoRotateOffset = 0;
    let lastInteraction = Date.now();

    function getOrbitRadius() {
      const w = orbitStage.clientWidth;
      return w * 0.34;
    }

    function positionOrbit() {
      const radius = getOrbitRadius();
      const total = orbitItems.length;

      orbitItems.forEach((item, index) => {
        const step = (Math.PI * 2) / total;
        const angle = currentAngle + step * index;

        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;

        const normalized = Math.sin(angle);
        const depth = (normalized + 1) / 2;
        const scale = 0.84 + depth * 0.34;
        const opacity = 0.62 + depth * 0.38;
        const zIndex = Math.round(depth * 100);

        item.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) scale(${scale})`;
        item.style.opacity = opacity;
        item.style.zIndex = zIndex;
      });
    }

    function animateOrbit() {
      const isTouchDevice = window.matchMedia("(pointer: coarse)").matches || window.innerWidth <= 768;
      if (isTouchDevice && Date.now() - lastInteraction > 1200) {
        autoRotateOffset += 0.01;
        targetAngle = baseAngle + autoRotateOffset;
      }

      currentAngle += (targetAngle - currentAngle) * 0.08;
      positionOrbit();
      requestAnimationFrame(animateOrbit);
    }

    function updateAngleFromClientX(clientX) {
      const rect = orbitStage.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const deltaX = clientX - centerX;
      targetAngle = baseAngle + deltaX * 0.0085;
      lastInteraction = Date.now();
    }

    function movePointer(x, y) {
      pointerX = x;
      pointerY = y;
      createSpark(x, y);
    }

    function createSpark(x, y) {
      if (!cursor) return;
      const spark = document.createElement("span");
      spark.className = "spark";
      spark.style.left = x + "px";
      spark.style.top = y + "px";
      spark.style.setProperty("--dx", Math.random() * 30 - 15 + "px");
      spark.style.setProperty("--dy", Math.random() * 30 - 15 + "px");
      cursor.appendChild(spark);
      window.setTimeout(() => spark.remove(), 800);
    }

    orbitStage.addEventListener("mousemove", (event) => {
      updateAngleFromClientX(event.clientX);
    });

    orbitStage.addEventListener("mouseleave", () => {
      targetAngle = baseAngle;
      lastInteraction = Date.now();
    });

    orbitStage.addEventListener("touchstart", (event) => {
      const touch = event.touches[0];
      if (!touch) return;
      updateAngleFromClientX(touch.clientX);
      movePointer(touch.clientX, touch.clientY);
    }, { passive: true });

    orbitStage.addEventListener("touchmove", (event) => {
      const touch = event.touches[0];
      if (!touch) return;
      updateAngleFromClientX(touch.clientX);
      movePointer(touch.clientX, touch.clientY);
    }, { passive: true });

    window.addEventListener("mousemove", (event) => {
      movePointer(event.clientX, event.clientY);
    });

    window.addEventListener("touchmove", (event) => {
      const touch = event.touches[0];
      if (!touch) return;
      movePointer(touch.clientX, touch.clientY);
    }, { passive: true });

    window.addEventListener("touchstart", (event) => {
      const touch = event.touches[0];
      if (!touch) return;
      movePointer(touch.clientX, touch.clientY);
    }, { passive: true });

    function animateCursor() {
      if (!core) return;
      cursorX += (pointerX - cursorX) * 0.18;
      cursorY += (pointerY - cursorY) * 0.18;
      core.style.left = cursorX + "px";
      core.style.top = cursorY + "px";
      requestAnimationFrame(animateCursor);
    }

    window.addEventListener("resize", () => {
      positionOrbit();
      lastInteraction = Date.now();
    });

    orbitItems.forEach((item) => {
      item.addEventListener("mouseenter", () => {
        item.style.transition = "transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, filter 0.18s ease, opacity 0.18s ease";
      });
    });

    positionOrbit();
    animateOrbit();
    animateCursor();
  </script>
