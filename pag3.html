<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FADAISI — Page 3</title>

  <style>
    :root {
      --bg: #ececec;
      --text: #1a1a1a;
      --accent: #ff3b30;
      --pill-bg: rgba(255, 255, 255, 0.35);
      --pill-border: rgba(255, 255, 255, 0.22);
      --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 18px 35px rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ===== FIXED HEAD / HERO ===== */

    .page-shell {
      position: relative;
      width: 100%;
      min-height: 100vh;
    }

    .hero {
      position: relative;
      width: 100%;
      padding: 18px 14px 0;
    }

    .signal-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--accent);
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
      white-space: nowrap;
    }

    .hero-logo-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 6px;
    }

    .hero-logo {
      width: min(66vw, 320px);
      object-fit: contain;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.08));
      user-select: none;
      pointer-events: none;
    }

    .hero-title {
      margin: 18px 0 16px;
      text-align: center;
      color: var(--accent);
      font-weight: 800;
      font-size: clamp(18px, 3.7vw, 28px);
      line-height: 1;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    .pill-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin: 0 auto;
      width: min(100%, 1120px);
      padding: 0 4px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 58px;
      padding: 7px 14px;
      border-radius: 999px;
      background: var(--pill-bg);
      border: 1px solid var(--pill-border);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      color: var(--accent);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1;
      transition: transform 0.18s ease, opacity 0.18s ease, border-color 0.18s ease;
    }

    .pill:hover {
      transform: translateY(-1px);
      opacity: 0.82;
      border-color: rgba(255, 59, 48, 0.16);
    }

    /* ===== MAIN CONTENT ===== */

    .page3-main {
      width: min(100%, 1180px);
      margin: 0 auto;
      padding: 26px 20px 80px;
    }

    /* ===== ORBIT SECTION ===== */

    .orbit-section {
      position: relative;
      width: 100%;
      display: grid;
      place-items: center;
      margin-top: 8px;
      margin-bottom: 76px;
    }

    .orbit-stage {
      position: relative;
      width: min(82vw, 700px);
      aspect-ratio: 1 / 1;
      max-width: 700px;
      min-width: 280px;
      overflow: visible;
    }

    .orbit-ring {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: 50%;
    }

    .orbit-item {
      position: absolute;
      top: 50%;
      left: 50%;
      width: clamp(92px, 13vw, 138px);
      aspect-ratio: 1.48 / 1;
      transform-origin: center center;
      border: 3px solid rgba(255, 255, 255, 0.55);
      background: rgba(255, 255, 255, 0.15);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      cursor: pointer;
      transition:
        transform 0.22s ease,
        box-shadow 0.22s ease,
        border-color 0.22s ease,
        filter 0.22s ease,
        opacity 0.22s ease;
      will-change: transform;
    }

    .orbit-item img,
    .orbit-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.96) contrast(1.02);
      pointer-events: none;
    }

    .orbit-item:hover {
      z-index: 20 !important;
      border-color: rgba(255, 59, 48, 0.4);
      box-shadow: var(--shadow-hover);
      filter: brightness(1.05);
    }

    .orbit-item::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.04) 0%,
          rgba(255, 255, 255, 0) 40%,
          rgba(255, 255, 255, 0.06) 100%
        );
      mix-blend-mode: screen;
      pointer-events: none;
    }

    /* ===== LOWER GRID ===== */

    .archive-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 28px 22px;
      align-items: start;
      justify-items: center;
    }

    .archive-card {
      position: relative;
      width: 100%;
      max-width: 150px;
      aspect-ratio: 0.74 / 1;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      transition:
        transform 0.22s ease,
        box-shadow 0.22s ease,
        filter 0.22s ease;
      cursor: pointer;
      isolation: isolate;
    }

    .archive-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.26s ease, filter 0.26s ease;
    }

    .archive-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.14), transparent 58%),
        linear-gradient(180deg, rgba(255, 59, 48, 0.07), rgba(255, 255, 255, 0));
      opacity: 0;
      transition: opacity 0.24s ease;
      z-index: 1;
      pointer-events: none;
    }

    .archive-card::after {
      content: "";
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
      pointer-events: none;
      z-index: 2;
    }

    .archive-card:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.11);
      filter: brightness(1.03);
    }

    .archive-card:hover::before {
      opacity: 1;
    }

    .archive-card:hover img {
      transform: scale(1.045);
      filter: saturate(1.05) contrast(1.04);
    }

    /* ===== OPTIONAL SECTION SPACING TO MATCH OTHER PAGES ===== */

    .bottom-space {
      height: 60px;
    }

    /* ===== TABLET ===== */

    @media (max-width: 900px) {
      .page3-main {
        padding-top: 28px;
      }

      .archive-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 22px 16px;
      }

      .archive-card {
        max-width: 132px;
      }
    }

    /* ===== MOBILE ===== */

    @media (max-width: 768px) {
      .hero {
        padding: 12px 10px 0;
      }

      .signal-row {
        font-size: 8px;
        letter-spacing: 0.05em;
        margin-bottom: 14px;
      }

      .hero-logo {
        width: min(72vw, 260px);
      }

      .hero-title {
        margin-top: 14px;
        margin-bottom: 14px;
        font-size: clamp(16px, 5.8vw, 22px);
      }

      .pill-row {
        padding: 0;
      }

      .pill {
        min-width: 56px;
        padding: 7px 12px;
        font-size: 8px;
      }

      .page3-main {
        padding: 20px 18px 70px;
      }

      .orbit-section {
        margin-bottom: 56px;
      }

      .orbit-stage {
        width: min(90vw, 420px);
      }

      .orbit-item {
        width: clamp(84px, 24vw, 108px);
        border-width: 2px;
      }

      .archive-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px 12px;
      }

      .archive-card {
        max-width: 94px;
      }
    }

    @media (max-width: 520px) {
      .signal-row {
        font-size: 7px;
      }

      .page3-main {
        padding-left: 16px;
        padding-right: 16px;
      }

      .archive-grid {
        gap: 16px 10px;
      }

      .archive-card {
        max-width: 84px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="signal-row">
        <span>QUERY_STRUCTURE SIGNAL</span>
        <span>DEEP LEARNING_PROMPT ENGINEER</span>
      </div>

      <div class="hero-logo-wrap">
        <img class="hero-logo" src="assets/https://i.ibb.co/LX1VH1bs/logo-fadaisi.png" alt="Fadaisi logo" />
      </div>

      <h1 class="hero-title">LIVE STUDIO 2026</h1>

      <div class="pill-row">
        <a class="pill" href="https://github.com/fadaisi/fadaisi.github.io" target="_blank" rel="noopener noreferrer">GitHub</a>
        <!-- TROQUE AQUI PELO SEU LINK DE DOWNLOAD / ARQUIVO -->
        <a class="pill" href="#" target="_blank" rel="noopener noreferrer">Arquivo</a>
      </div>
    </header>

    <main class="page3-main">
      <section class="orbit-section" aria-label="Arquivo rotativo">
        <div class="orbit-stage" id="orbitStage">
          <div class="orbit-ring" id="orbitRing">
            <!-- TROQUE AS IMAGENS PELOS THUMBS DOS VÍDEOS / ARQUIVOS -->
            <a class="orbit-item" href="#" style="--i:0;"><img src="assets/thumb-01.jpg" alt="arquivo 1"></a>
            <a class="orbit-item" href="#" style="--i:1;"><img src="assets/thumb-02.jpg" alt="arquivo 2"></a>
            <a class="orbit-item" href="#" style="--i:2;"><img src="assets/thumb-03.jpg" alt="arquivo 3"></a>
            <a class="orbit-item" href="#" style="--i:3;"><img src="assets/thumb-04.jpg" alt="arquivo 4"></a>
            <a class="orbit-item" href="#" style="--i:4;"><img src="assets/thumb-05.jpg" alt="arquivo 5"></a>
            <a class="orbit-item" href="#" style="--i:5;"><img src="assets/thumb-06.jpg" alt="arquivo 6"></a>
            <a class="orbit-item" href="#" style="--i:6;"><img src="assets/thumb-07.jpg" alt="arquivo 7"></a>
            <a class="orbit-item" href="#" style="--i:7;"><img src="assets/thumb-08.jpg" alt="arquivo 8"></a>
          </div>
        </div>
      </section>

      <section class="archive-grid" aria-label="Grade de arquivos">
        <!-- TROQUE AS IMAGENS DE BAIXO -->
        <a class="archive-card" href="#"><img src="assets/grid-01.jpg" alt="arquivo abaixo 1"></a>
        <a class="archive-card" href="#"><img src="assets/grid-02.jpg" alt="arquivo abaixo 2"></a>
        <a class="archive-card" href="#"><img src="assets/grid-03.jpg" alt="arquivo abaixo 3"></a>
        <a class="archive-card" href="#"><img src="assets/grid-04.jpg" alt="arquivo abaixo 4"></a>
        <a class="archive-card" href="#"><img src="assets/grid-05.jpg" alt="arquivo abaixo 5"></a>
        <a class="archive-card" href="#"><img src="assets/grid-06.jpg" alt="arquivo abaixo 6"></a>
        <a class="archive-card" href="#"><img src="assets/grid-07.jpg" alt="arquivo abaixo 7"></a>
        <a class="archive-card" href="#"><img src="assets/grid-08.jpg" alt="arquivo abaixo 8"></a>
      </section>

      <div class="bottom-space"></div>
    </main>
  </div>

  <script>
    const orbitStage = document.getElementById("orbitStage");
    const orbitItems = Array.from(document.querySelectorAll(".orbit-item"));

    let baseAngle = -Math.PI / 2;
    let targetAngle = baseAngle;
    let currentAngle = baseAngle;

    function getOrbitRadius() {
      const w = orbitStage.clientWidth;
      return w * 0.34;
    }

    function positionOrbit() {
      const radius = getOrbitRadius();
      const total = orbitItems.length;

      orbitItems.forEach((item, index) => {
        const step = (Math.PI * 2) / total;
        const angle = currentAngle + step * index;

        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;

        const normalized = Math.sin(angle);
        const depth = (normalized + 1) / 2;
        const scale = 0.84 + depth * 0.34;
        const opacity = 0.62 + depth * 0.38;
        const zIndex = Math.round(depth * 100);

        item.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) scale(${scale})`;
        item.style.opacity = opacity;
        item.style.zIndex = zIndex;
      });
    }

    function animateOrbit() {
      currentAngle += (targetAngle - currentAngle) * 0.08;
      positionOrbit();
      requestAnimationFrame(animateOrbit);
    }

    orbitStage.addEventListener("mousemove", (event) => {
      const rect = orbitStage.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const deltaX = event.clientX - centerX;
      targetAngle = baseAngle + deltaX * 0.0085;
    });

    orbitStage.addEventListener("mouseleave", () => {
      targetAngle = baseAngle;
    });

    window.addEventListener("resize", positionOrbit);

    orbitItems.forEach((item) => {
      item.addEventListener("mouseenter", () => {
        item.style.transition = "transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, filter 0.18s ease, opacity 0.18s ease";
      });
    });

    positionOrbit();
    animateOrbit();
  </script>
</body>
</html>
